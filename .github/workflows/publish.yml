name: Publish

# Trigger: push a tag (e.g. v0.1.0) → JitPack auto-builds & publishes
# No manual workflow needed — JitPack watches tags automatically.
#
# This workflow is for local dev use: builds + runs tests.
# The actual publishing to JitPack happens when you push a tag.

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Test
        run: ./gradlew build
